<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CleanUp · Plattform</title>
  <link rel="icon" type="image/png" href="CleanUp%20favicon.png" />

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1e50b8" />
      <text x="50" y="62" font-family="sans-serif" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">C<tspan fill="#f2603c">.</tspan></text>
    </svg>
  </template>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eef3fc', 100: '#d8e4f8', 200: '#b3c8f0', 300: '#84a4e6',
              400: '#5079d6', 500: '#2f5ac6', 600: '#1e50b8', 700: '#1a429a',
              800: '#18387d', 900: '#173265',
            },
            accent: {
              50:  'rgb(var(--a50) / <alpha-value>)',
              100: 'rgb(var(--a100) / <alpha-value>)',
              500: 'rgb(var(--a500) / <alpha-value>)',
              600: 'rgb(var(--a600) / <alpha-value>)',
              700: 'rgb(var(--a700) / <alpha-value>)',
            },
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --a50: 255 242 238; --a100: 255 225 214;
      --a500: 242 96 60; --a600: 224 74 38; --a700: 187 58 29;
    }
    html, body { font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif; -webkit-text-size-adjust: 100%; }
    body { margin: 0; }
    * { -webkit-tap-highlight-color: transparent; }

    /* Tweak: hörnradie – skala om de vanligaste containrarna live */
    body[data-round="Skarp"] .rounded-3xl { border-radius: .75rem !important; }
    body[data-round="Skarp"] .rounded-2xl { border-radius: .5rem !important; }
    body[data-round="Skarp"] .rounded-xl  { border-radius: .375rem !important; }
    body[data-round="Rundad"] .rounded-2xl { border-radius: 1.75rem !important; }
    body[data-round="Rundad"] .rounded-xl  { border-radius: 1rem !important; }
    body[data-round="Rundad"] .rounded-lg  { border-radius: .875rem !important; }

    /* finputsa scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Ordningen är viktig: senare filer använder globals från tidigare. -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/mock.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/views.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
